services:
  - type: web
    name: delay-argument-api
    runtime: docker
    region: frankfurt  # или ближайший к вам
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: RESULTS_DIR
        value: /opt/render/data/results
      - key: PORT
        value: 10000
    disk:
      name: results-storage
      mountPath: /opt/render/data
      sizeGB: 1
    autoDeploy: true
    healthCheckPath: /health